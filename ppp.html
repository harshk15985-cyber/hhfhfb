<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Students Registration Form</h1>
    <hr>
    <fieldset>
        <legend><b>Presonal Details</b></legend>
        <label for="">Full Name:</label>
        <input type="text" name="" id="" required><br><br>
        <label for="">Email:</label>
        <input type="email" name="" id="" required> <br><br>
        <label for="">Mobile Number:</label>
        <input type="tel" name="" id="" required pattern="[0,9] {10}">
        <br><small>Enter 10 digit Number</small><br><br>
        <label for="">Data of birth:</label>
        <input type="date" name="" id="" required>
        <br> <br>
        <label for="">Gender:</label>
        <input type="radio" name="dender" id="">Male
        <input type="radio" name="dender" id="">Female
        <input type="radio" name="dender" id="">Other




    </fieldset>
    <br>
    <fieldset>
        <legend><b>Account Details</b></legend>
        <label for="">UserName:</label>
        <input type="text" name="" id="" required><br><br>
        <label for="">Password:</label>
        <input type="password" name="" id="" required> <br><br>
        <label for="">Conform Password:</label>
        <input type="password" name="" id=""><br><br>
    </fieldset>
    <br>
    <fieldset>
        <legend><b>Education Details</b></legend>
        <label for="">Course</label>
        <select >
            <option value="">Select</option>
            <option value="">bca</option>
            <option value="">bba</option>
            <option value="">B.Tech</option>
            <option value="">Ba</option>
        </select>
        <br><br>
        <label for="">Scills:</label>
        <input type="checkbox" >HTML
        <input type="checkbox" >CSS
        <input type="checkbox" >javaScript
        <input type="checkbox" >Python
        <br><br>
        <label for="">Address:</label>
        <textarea cols="40" rows="4"></textarea>
        <br><br>

    </fieldset>
    <br>
    <fieldset>
        <legend><b>Upload Secation</b></legend>
        <label for="">Upload Photo:</label>
        <input type="file" name="" id="" required>
        <br><br>
        <label for="">Upload Resume:</label>
        <input type="file" name="" id=""><br><br>
        <br>
    </fieldset>
    <br>
    <input type="checkbox" name="" id="">I agree to the Terms & Conditions
    <br><br>
    <input type="submit" value="Registr">
    <input type="reset" value="Clear">
    <hr>
    <footer>
        Created by Harsh Kumar 🧑
    </footer>
</body>
</html>
